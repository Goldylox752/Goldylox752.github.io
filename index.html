<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIM2Door Dashboard – Real-Time GA4</title>
<meta name="description" content="Live SIM2Door dashboard showing pageviews, button clicks, and $20 SIM purchases from GA4.">
<link rel="stylesheet" href="style.css">

<style>
body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#f9f9f9; }
h1 { color:#222; text-align:center; margin-bottom:20px; }
section { background:#fff; padding:20px; margin-bottom:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
table { width:100%; border-collapse: collapse; margin-top:10px; }
th, td { border:1px solid #ddd; padding:10px; text-align:center; }
th { background:#007bff; color:#fff; }
</style>
</head>
<body>

<h1>SIM2Door Live GA4 Dashboard</h1>

<section id="traffic">
<h2>Landing Page Traffic</h2>
<table>
<tr><th>Page</th><th>Pageviews</th></tr>
<tr><td>Home</td><td id="pv-home">0</td></tr>
<tr><td>Canada SIM</td><td id="pv-canada">0</td></tr>
<tr><td>Travel SIM</td><td id="pv-travel">0</td></tr>
<tr><td>Cheap SIM</td><td id="pv-cheap">0</td></tr>
<tr><td>Prepaid SIM</td><td id="pv-prepaid">0</td></tr>
</table>
</section>

<section id="buy-clicks">
<h2>Buy Button Clicks</h2>
<table>
<tr><th>Button</th><th>Clicks</th></tr>
<tr><td>Buy SIM Home</td><td id="click-home">0</td></tr>
<tr><td>Buy SIM Canada</td><td id="click-canada">0</td></tr>
<tr><td>Buy SIM Travel</td><td id="click-travel">0</td></tr>
<tr><td>Buy SIM Cheap</td><td id="click-cheap">0</td></tr>
<tr><td>Buy SIM Prepaid</td><td id="click-prepaid">0</td></tr>
</table>
</section>

<section id="sales">
<h2>Confirmed $20 SIM Purchases</h2>
<p>Total Revenue: <strong id="total-revenue">$0</strong></p>
<p>Total SIMs Sold: <strong id="total-sims">0</strong></p>
</section>

<script>
// === CONFIG ===
const SIM_PRICE = 20; // $20 per SIM
const GA4_API_KEY = 'YOUR_API_KEY_OR_SERVICE_ACCOUNT'; // Replace with your GA4 key
const GA4_PROPERTY_ID = 'YOUR_GA4_PROPERTY_ID'; // Replace with GA4 property number

// Example fetch function (replace with actual GA4 API integration)
async function fetchGA4Data() {
  try {
    // Placeholder: Replace this URL with GA4 Reporting API endpoint
    // Example: https://analyticsdata.googleapis.com/v1beta/properties/YOUR_PROPERTY_ID:runReport
    // Fetch pageviews and buy_click events
    const response = await fetch('https://your-server-endpoint.com/get-ga4-data'); 
    const data = await response.json();

    // Example structure returned: 
    // data = {pageviews: {home: 125, canada:87,...}, clicks:{home:15,...}, totalSims:50}
    
    document.getElementById('pv-home').textContent = data.pageviews.home;
    document.getElementById('pv-canada').textContent = data.pageviews.canada;
    document.getElementById('pv-travel').textContent = data.pageviews.travel;
    document.getElementById('pv-cheap').textContent = data.pageviews.cheap;
    document.getElementById('pv-prepaid').textContent = data.pageviews.prepaid;

    document.getElementById('click-home').textContent = data.clicks.home;
    document.getElementById('click-canada').textContent = data.clicks.canada;
    document.getElementById('click-travel').textContent = data.clicks.travel;
    document.getElementById('click-cheap').textContent = data.clicks.cheap;
    document.getElementById('click-prepaid').textContent = data.clicks.prepaid;

    document.getElementById('total-sims').textContent = data.totalSims;
    document.getElementById('total-revenue').textContent = `$${data.totalSims*SIM_PRICE}`;
  } catch (error) {
    console.error('Error fetching GA4 data:', error);
  }
}

// Refresh every 30 seconds
fetchGA4Data();
setInterval(fetchGA4Data, 30000);
</script>

</body>
</html>
