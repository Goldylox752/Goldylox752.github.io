<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Engine | SS Solutions</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root {
            --bg: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            --glass: rgba(30, 41, 59, 0.75);
            --text: #f8fafc;
            --subtext: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
            --green: #22c55e;
            --red: #ef4444;
        }

        .light-mode {
            --bg: radial-gradient(circle at top left, #f1f5f9, #cbd5e1);
            --glass: rgba(255, 255, 255, 0.85);
            --text: #0f172a;
            --subtext: #475569;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; transition: 0.3s ease; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; min-height: 100vh; }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        /* Status Indicator */
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 10px; font-weight: 800; letter-spacing: 1px; }
        .indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .offline { background: var(--red); box-shadow: 0 0 8px var(--red); }

        .theme-toggle { cursor: pointer; font-size: 18px; opacity: 0.6; }
        .theme-toggle:hover { opacity: 1; }

        h1 { font-size: 30px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 5px; }
        .subtitle { color: var(--subtext); font-size: 14px; margin-bottom: 25px; }

        .section {
            background: rgba(0, 0, 0, 0.15);
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            text-align: left;
        }

        label { display: block; font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }

        input, select {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.1); color: var(--text); outline: none; margin-bottom: 12px; font-size: 14px;
        }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-size: 14px; text-decoration: none; display: inline-block; text-align: center;
        }

        .btn-dl { background: var(--green); color: white; }
        .btn-gif { background: var(--accent); color: #0f172a; }
        .btn-stripe { background: #6366f1; color: white; margin-top: 10px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }

        .status-text { font-size: 12px; color: var(--accent); margin-top: 10px; text-align: center; min-height: 18px; font-style: italic; }

        .gif-result { display: none; margin-top: 20px; background: #000; border-radius: 16px; padding: 10px; border: 2px solid var(--accent); }
        #gifPreview { width: 100%; border-radius: 8px; margin-bottom: 10px; }

        footer { margin-top: 30px; font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: 3px; font-weight: 700; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-header">
        <div><span id="light" class="indicator offline"></span> ENGINE: <span id="engineStatus">OFFLINE</span></div>
        <div class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">🌓</div>
    </div>

    <h1>Asset Engine</h1>
    <p class="subtitle">High-speed Extraction & Branded GIFs</p>

    <!-- Download Section -->
    <div class="section">
        <label>Media Downloader</label>
        <input type="text" id="dlInput" placeholder="Paste Video URL">
        <label>Output Quality</label>
        <select id="quality">
            <option value="720">720p (Fast)</option>
            <option value="1080">1080p (HD)</option>
            <option value="2160">4K (Maximum)</option>
        </select>
        <button class="btn btn-dl" onclick="runDownload()">Extract Asset</button>
        <div class="status-text" id="dlStatus"></div>
    </div>

    <!-- GIF Section -->
    <div class="section">
        <label>Branded GIF Creator</label>
        <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="document.getElementById('fileLabel').innerText='✅ File Loaded'">
        <label for="fileInput" id="fileLabel" style="background:rgba(0,0,0,0.1); padding:12px; border-radius:12px; cursor:pointer; text-align:center; border: 1px dashed var(--accent); display: block;">📁 Upload Video</label>
        <button class="btn btn-gif" onclick="runGif()">Generate GIF</button>
        <div class="status-text" id="gifStatus"></div>
        <div id="gifResult" class="gif-result">
            <img id="gifPreview" src="">
            <a id="gifSave" href="#" download="SS-Branded.gif" class="btn btn-dl">Save Branded GIF</a>
        </div>
    </div>

    <!-- Payment Section -->
    <div style="padding: 10px 0;">
        <p style="font-size: 11px; color: var(--subtext); margin-bottom: 8px; font-weight: 600;">Support the infrastructure ❤️</p>
        <a href="https://buy.stripe.com" target="_blank" class="btn btn-stripe">Donate with Stripe</a>
    </div>

    <footer>SS SOLUTIONS © 2026</footer>
</div>

<script>
    // Engine Heartbeat Simulation
    window.onload = () => {
        const light = document.getElementById('light');
        const text = document.getElementById('engineStatus');
        
        // Simulating a ping to your Vercel backend
        setTimeout(() => {
            light.className = "indicator online";
            text.innerText = "ONLINE";
        }, 1500);
    };

    async function runDownload() {
        const url = document.getElementById("dlInput").value;
        const quality = document.getElementById("quality").value;
        const status = document.getElementById("dlStatus");
        
        if (!url) return status.innerText = "⚠️ Please paste a link";
        status.innerText = "⚡ Routing through high-res nodes...";

        try {
            const res = await fetch(`/api/download?url=${encodeURIComponent(url)}&quality=${quality}`);
            const data = await res.json();
            if (data.downloadUrl) {
                status.innerText = "✅ Connection Ready!";
                window.open(data.downloadUrl, '_blank');
            } else { throw new Error(); }
        } catch {
            status.innerText = "❌ Nodes busy. Try a direct MP4 link.";
        }
    }

    function runGif() {
        const file = document.getElementById("fileInput").files;
        const status = document.getElementById("gifStatus");
        if (!file[0]) return status.innerText = "⚠️ Upload file first";

        status.innerText = "🎨 Branding SS-Solutions GIF...";
        gifshot.createGIF({
            video: [URL.createObjectURL(file[0])],
            numFrames: 25,
            text: 'SS SOLUTIONS',
            fontColor: '#38bdf8',
            fontWeight: '800',
            textAlign: 'right',
            textBaseline: 'bottom'
        }, function (obj) {
            if (!obj.error) {
                document.getElementById("gifPreview").src = obj.image;
                document.getElementById("gifSave").href = obj.image;
                document.getElementById("gifResult").style.display = "block";
                status.innerText = "✅ Branded & Ready!";
            }
        });
    }
</script>
</body>
</html>
