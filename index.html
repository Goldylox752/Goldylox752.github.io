<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIM2Door — Prepaid SIM Cards Canada</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background: #f7f7f7;
      color: #333;
    }
    header {
      text-align: center;
      margin-bottom: 30px;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #0056b3;
    }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <h1>SIM2Door 🇨🇦</h1>
    <p>Order Your $20 Prepaid SIM Card</p>
    <button onclick="alert('Order feature coming soon')">Buy SIM Card</button>
  </header>

  <section class="dashboard">
    <div class="card">
      <h3>Total SIMs Sold</h3>
      <p id="simSold">0</p>
    </div>
    <div class="card">
      <h3>Total Revenue</h3>
      <p id="revenue">$0</p>
    </div>
    <div class="card">
      <h3>Active Users</h3>
      <p id="activeUsers">0</p>
    </div>
    <div class="card">
      <h3>New Signups</h3>
      <p id="newSignups">0</p>
    </div>
  </section>

  <section>
    <h2>Recent Orders</h2>
    <ul id="ordersList">
      <li>No orders yet.</li>
    </ul>
  </section>

  <footer>
    © 2026 SIM2Door. All rights reserved.
  </footer>
</body>
</html>
