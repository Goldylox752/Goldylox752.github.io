<!-- Ethers.js -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.min.js"></script>
<script>
let provider;
let signer;
let contract;

// Replace these with your contract info
const CONTRACT_ADDRESS = "YOUR_SMART_CONTRACT_ADDRESS_HERE";
const CONTRACT_ABI = [ /* YOUR_CONTRACT_ABI_JSON_HERE */ ];

const connectBtn = document.getElementById('connectWallet');
const walletAddressEl = document.getElementById('walletAddress');
const buyBtn = document.getElementById('buySim');
const purchaseStatus = document.getElementById('purchaseStatus');

// Connect wallet
connectBtn.addEventListener('click', async () => {
    if(window.ethereum){
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        const address = await signer.getAddress();
        walletAddressEl.textContent = 'Connected Wallet: ' + address;

        // Initialize contract
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
    } else {
        walletAddressEl.textContent = 'No Web3 wallet detected. Install MetaMask.';
    }
});

// Buy & Mint NFT
buyBtn.addEventListener('click', async () => {
    if(!signer || !contract) { purchaseStatus.textContent = 'Connect your wallet first!'; return; }

    try {
        purchaseStatus.textContent = 'Sending transaction...';
        // Example: call your mint function (replace with your actual function)
        const tx = await contract.mint({ value: ethers.parseEther("0.01") }); // price in ETH
        purchaseStatus.textContent = 'Transaction sent. Waiting for confirmation...';
        await tx.wait();
        purchaseStatus.textContent = '✅ SIM NFT minted successfully!';
    } catch(err) {
        console.error(err);
        purchaseStatus.textContent = 'Transaction failed: ' + err.message;
    }
});
</script>
