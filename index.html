<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS Solutions | Asset Engine</title>
    <style>
        /* [Keeping your previous CSS styling here] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: white; display: flex; justify-content: center; padding: 40px 20px; min-height: 100vh; }
        .container { background: #1e293b; padding: 30px; border-radius: 16px; width: 100%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 12px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-primary { background: #22c55e; }
        .btn-stripe { background: #6366f1; margin-top: 10px; text-decoration: none; display: inline-block; }
        .status { margin: 10px 0; font-size: 13px; color: #38bdf8; }
        .divider { height: 1px; background: #334155; margin: 20px 0; }
        .history-item { background: #0f172a; padding: 8px; border-radius: 6px; margin-top: 5px; font-size: 11px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>Asset Engine</h1>
    <p>Media Downloader & GIF Tool</p>

    <input type="text" id="urlInput" placeholder="Paste YouTube, Twitter, or TikTok URL">
    <button class="btn btn-primary" id="dlBtn" onclick="startDownload()">Download Asset</button>
    <div class="status" id="statusMessage">Ready</div>

    <div class="divider"></div>

    <a href="https://buy.stripe.com" target="_blank" class="btn btn-stripe">Support Project ❤️</a>

    <div class="history-section" style="margin-top:20px;">
        <h3 style="font-size:14px; text-align:left;">Recent Activity</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    async function startDownload() {
        const urlInput = document.getElementById("urlInput");
        const status = document.getElementById("statusMessage");
        const btn = document.getElementById("dlBtn");
        const url = urlInput.value.trim();

        if (!url) {
            status.innerText = "⚠️ Please paste a URL";
            return;
        }

        // UI Feedback
        status.innerText = "⚡ Requesting server...";
        btn.disabled = true;
        btn.style.opacity = "0.5";

        try {
            // CALLING THE BACKEND
            const response = await fetch(`/api/download?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if (data.downloadUrl) {
                status.innerText = "✅ Success! Opening download...";
                window.open(data.downloadUrl, '_blank'); // Opens the direct file
                saveToHistory(url);
            } else {
                status.innerText = "❌ Error: " + (data.error || "Failed");
            }
        } catch (err) {
            status.innerText = "❌ Connection Failed";
        } finally {
            btn.disabled = false;
            btn.style.opacity = "1";
        }
    }

    function saveToHistory(url) {
        const list = document.getElementById("historyList");
        const entry = document.createElement("div");
        entry.className = "history-item";
        entry.innerText = `Downloaded: ${url.substring(0, 40)}...`;
        list.prepend(entry);
    }
</script>

</body>
</html>
