<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Solutions | Asset Engine</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: #1e293b;
  padding: 35px;
  border-radius: 12px;
  width: 380px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
}

h1 {
  margin-bottom: 10px;
}

p {
  color: #94a3b8;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #16a34a;
}

.status {
  margin-top: 15px;
  font-size: 14px;
  color: #cbd5f5;
}

.donate {
  margin-top: 25px;
  padding-top: 15px;
  border-top: 1px solid #334155;
  text-align: center;
}

.donate p {
  margin-bottom: 10px;
  color: #94a3b8;
  font-weight: bold;
}

footer {
  margin-top: 15px;
  font-size: 12px;
  color: #64748b;
}
</style>
</head>

<body>
<div class="container">
<h1>Asset Engine</h1>
<p>Download media or generate GIFs</p>

<input type="text" id="urlInput" placeholder="Paste video or media URL">

<button onclick="startDownload()">Download Asset</button>

<div class="status" id="statusMessage">Waiting for input...</div>

<div class="donate">
  <p>Support the project ❤️</p>
  <!-- Stripe Buy Button -->
  <script async src="https://js.stripe.com/v3/buy-button.js"></script>
  <stripe-buy-button
    buy-button-id="YOUR_BUY_BUTTON_ID"
    publishable-key="YOUR_PUBLISHABLE_KEY">
  </stripe-buy-button>
</div>

<footer>SS Solutions © 2026</footer>
</div>

<script>
function startDownload() {
  const url = document.getElementById("urlInput").value;
  const status = document.getElementById("statusMessage");

  if (!url) {
    status.innerText = "Please paste a media URL.";
    return;
  }

  status.innerText = "Processing asset...";

  // Demo delay
  setTimeout(() => {
    status.innerText = "Download ready (demo mode)";
  }, 2000);
}
</script>
</body>
</html>
