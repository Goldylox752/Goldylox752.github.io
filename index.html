<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky OS · Revenue Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#020617;
  color:#fff;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.badge {
  padding:6px 14px;
  border-radius:30px;
  font-size:12px;
  font-weight:600;
}

.locked { background:#7f1a1a; color:#fecaca; }
.active { background:#14532d; color:#bbf7d0; }

.pricing {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:40px;
}

.card {
  flex:1;
  min-width:200px;
  background:#0f172a;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

button {
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:30px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.dashboard {
  background:#0f172a;
  padding:30px;
  border-radius:20px;
  position:relative;
}

.locked-ui {
  filter:blur(10px);
  pointer-events:none;
}

.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

  <div class="nav">
    <h2>☁️ NorthSky OS</h2>
    <div id="status" class="badge locked">LOCKED</div>
  </div>

  <div class="pricing">
    <div class="card">
      <h3>Starter</h3>
      <p>$99/mo</p>
      <button class="buy" data-plan="starter">Subscribe</button>
    </div>
    <div class="card">
      <h3>Pro</h3>
      <p>$299/mo</p>
      <button class="buy" data-plan="pro">Subscribe</button>
    </div>
    <div class="card">
      <h3>Elite</h3>
      <p>$999/mo</p>
      <button class="buy" data-plan="elite">Subscribe</button>
    </div>
  </div>

  <div class="dashboard">
    <div id="overlay" class="overlay">
      <div>🔒 Subscribe to unlock</div>
    </div>

    <div id="app" class="locked-ui">
      <h2 id="plan">No Plan</h2>

      <h3>Score: <span id="score">0</span></h3>
      <h3>Revenue: $<span id="revenue">0</span></h3>

      <button id="addScore">+10 Score</button>
      <button id="routeLead">Route Lead (+$75)</button>

      <div style="margin-top:20px;">
        <input id="email" placeholder="Email">
        <input id="name" placeholder="Name">
        <button id="offer">Join Offers</button>
      </div>

      <button id="logout" style="margin-top:20px;">Sign Out</button>
    </div>
  </div>

</div>

<script>
(() => {

const API = "https://YOUR_BACKEND_URL"; // 🔥 CHANGE THIS

let state = {
  auth:false,
  plan:null,
  score:0,
  revenue:0
};

const el = id => document.getElementById(id);

function render() {
  el("score").innerText = state.score;
  el("revenue").innerText = state.revenue;

  if (!state.auth) {
    el("app").classList.add("locked-ui");
    el("overlay").classList.remove("hidden");
    el("status").innerText = "LOCKED";
    el("status").className = "badge locked";
    el("plan").innerText = "No Plan";
    return;
  }

  el("app").classList.remove("locked-ui");
  el("overlay").classList.add("hidden");
  el("status").innerText = "ACTIVE";
  el("status").className = "badge active";
  el("plan").innerText = state.plan;
}

function save() {
  localStorage.setItem("score", state.score);
  localStorage.setItem("rev", state.revenue);
}

function load() {
  state.score = parseInt(localStorage.getItem("score")||0);
  state.revenue = parseInt(localStorage.getItem("rev")||0);
}

async function api(path,data={}) {
  try {
    const r = await fetch(API+path,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });
    return await r.json();
  } catch {
    return {valid:false};
  }
}

async function verify(id) {
  return await api("/api/verify",{session_id:id});
}

async function auth() {
  const p = new URLSearchParams(location.search);
  const sid = p.get("session_id");

  if (sid) {
    const r = await verify(sid);
    if (r.valid) {
      localStorage.setItem("token", r.token);
      state.auth = true;
      state.plan = r.plan;
    }
    history.replaceState({}, "", location.pathname);
  }

  const token = localStorage.getItem("token");
  if (!token) return;

  const r = await verify(token);
  if (r.valid) {
    state.auth = true;
    state.plan = r.plan;
  } else {
    localStorage.removeItem("token");
  }
}

function guard() {
  if (!state.auth) {
    document.querySelector(".pricing").scrollIntoView({behavior:"smooth"});
    return false;
  }
  return true;
}

function addScore() {
  if (!guard()) return;
  state.score += 10;
  save();
  render();
}

function routeLead() {
  if (!guard()) return;
  if (state.score < 80) return alert("Need 80 score");
  state.revenue += 75;
  save();
  render();
}

async function offer() {
  if (!guard()) return;

  await api("/api/offer-signup",{
    email:el("email").value,
    name:el("name").value,
    token:localStorage.getItem("token")
  });

  el("email").value="";
  el("name").value="";
}

async function subscribe(plan) {
  const r = await api("/api/create-checkout",{
    plan,
    successUrl:location.origin+"?session_id={CHECKOUT_SESSION_ID}",
    cancelUrl:location.origin
  });

  if (r.url) location.href = r.url;
}

function logout() {
  localStorage.clear();
  state = {auth:false,plan:null,score:0,revenue:0};
  render();
}

function bind() {
  document.querySelectorAll(".buy").forEach(b=>{
    b.onclick=()=>subscribe(b.dataset.plan);
  });

  el("addScore").onclick=addScore;
  el("routeLead").onclick=routeLead;
  el("offer").onclick=offer;
  el("logout").onclick=logout;
}

async function init() {
  load();
  await auth();
  bind();
  render();
}

init();

})();
</script>

</body>
</html>
