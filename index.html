<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NorthSky Auction OS · Real-Time Lead Auction</title>

<!-- ✅ Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2NZW6V24JP"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-2NZW6V24JP');
</script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0c12;--surface:#11131c;--text:#edf2f8;--muted:#8e9aaf;
--border:rgba(255,255,255,.06);--accent:#2dd4bf;--accent-dark:#14b8a6;
--warn:#f59e0b
}
body{
background:linear-gradient(135deg,#0f172a,#020617);
color:var(--text);
font-family:system-ui,-apple-system,Segoe UI,sans-serif;
padding:2rem 1rem
}
.container{max-width:1300px;margin:auto}
.header{text-align:center;margin-bottom:2.5rem}
.badge{
background:rgba(45,212,191,.1);
border:1px solid rgba(45,212,191,.3);
padding:.3rem 1rem;border-radius:40px;
font-size:.75rem;color:var(--accent)
}
h1{font-size:2.3rem;margin-top:.6rem}
.sub{color:var(--muted);margin-top:.4rem}

.grid{
display:grid;
grid-template-columns:1fr 1.2fr;
gap:1.5rem
}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

.card{
background:rgba(17,19,28,.7);
border:1px solid var(--border);
border-radius:1.5rem;
padding:1.4rem
}
.card-header{
font-weight:600;margin-bottom:1rem;
border-bottom:1px solid var(--border);
padding-bottom:.5rem
}

input,select{
width:100%;
padding:.75rem;
margin-bottom:.9rem;
background:#0b0e17;
border:1px solid var(--border);
border-radius:.8rem;
color:#fff
}

button{
width:100%;
padding:.8rem;
border:none;border-radius:1rem;
background:var(--accent);
font-weight:700;color:#020617;
cursor:pointer
}
button:hover{background:var(--accent-dark)}

.secondary{background:#2d3748;color:#fff}

.status{font-size:.8rem;margin-top:.6rem;color:var(--muted)}

.bid-row{display:flex;gap:.5rem}
.bid-row input{flex:1}

.timer{font-family:monospace;color:var(--warn)}

.history{max-height:160px;overflow:auto;font-size:.8rem;color:var(--muted)}
.history div{padding:.3rem 0;border-bottom:1px solid var(--border)}

.footer{text-align:center;margin-top:2rem;font-size:.7rem;color:var(--muted)}
</style>
</head>

<body>
<div class="container">

<div class="header">
<div class="badge">⚡ REAL-TIME AI LEAD MARKETPLACE</div>
<h1>NorthSky Auction OS</h1>
<div class="sub">Live contractor bidding for high-value leads</div>
</div>

<div class="grid">

<!-- Lead Form -->
<div class="card">
<div class="card-header">🏠 New Lead</div>

<input id="leadName" placeholder="Full name">
<input id="leadContact" placeholder="Phone / Email">
<input id="leadPostal" placeholder="Postal code">

<select id="leadService">
<option>Roof inspection</option>
<option>Leak check</option>
<option>Insurance claim</option>
<option>Full replacement</option>
</select>

<button id="submitLead">Generate Lead</button>
<div id="leadStatus" class="status">Ready</div>
</div>

<!-- Auction -->
<div class="card">
<div class="card-header">🔨 Live Auction</div>

<input id="contractorId" placeholder="Contractor ID">
<input id="city" value="Calgary">

<button id="join" class="secondary">Join Market</button>

<div id="auction" style="margin-top:1rem">
<div id="info">No active auction</div>

<div id="bidUI" style="display:none">
<div class="bid-row">
<input id="bidAmount" type="number" placeholder="Bid $">
<button id="bidBtn">Bid</button>
</div>
<div id="feedback" class="status"></div>
</div>

<div id="history" class="history"></div>
</div>

</div>
</div>

<div class="footer">Powered by NorthSky AI</div>

</div>

<script>
const BACKEND = "";
let socket, contractor="", city="", lead=null, highest=0, expires=0;

function connect(){
socket = io(BACKEND || location.origin);

socket.on("connect",()=>console.log("connected"));

socket.on("auction_started",d=>{
lead=d.leadId; expires=d.expiresAt; highest=0;
document.getElementById("bidUI").style.display="block";
document.getElementById("info").innerHTML="Auction live";
document.getElementById("history").innerHTML="";
});

socket.on("new_bid",d=>{
if(d.leadId!==lead) return;
highest=d.highestBid;
addHistory(d.contractorId,d.highestBid);

gtag('event','bid_activity',{value:d.highestBid});
});

socket.on("auction_closed",d=>{
document.getElementById("bidUI").style.display="none";

if(d.winnerId===contractor){
gtag('event','auction_win',{value:d.price});
}

document.getElementById("info").innerHTML="Auction closed";
});
}

function addHistory(id,amt){
const el=document.createElement("div");
el.innerHTML=`${id} → $${amt}`;
document.getElementById("history").prepend(el);
}

document.getElementById("join").onclick=()=>{
contractor=document.getElementById("contractorId").value;
city=document.getElementById("city").value;
if(!socket) connect();
socket.emit("join_city",city);
};

document.getElementById("submitLead").onclick=async()=>{
const body={
name:leadName.value,
contact:leadContact.value,
postal:leadPostal.value,
service:leadService.value,
city:city || "unknown"
};

gtag('event','lead_created',{event_label:body.service});

await fetch((BACKEND||location.origin)+"/lead",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(body)
});

document.getElementById("leadStatus").innerText="Lead sent";
};

document.getElementById("bidBtn").onclick=()=>{
const amt=parseFloat(bidAmount.value);
if(amt<=highest) return;

socket.emit("bid",{leadId:lead,contractorId:contractor,amount:amt});

gtag('event','bid_placed',{value:amt});
};
</script>

</body>
</html>
