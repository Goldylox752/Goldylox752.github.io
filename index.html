<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NorthSky OS · Revenue Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Inter,sans-serif;
  background:#020617;
  color:#fff;
}

.container { max-width:1100px; margin:auto; padding:20px; }

.nav {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.badge {
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  background:#1e293b;
}

.pricing {
  display:flex;
  gap:20px;
  margin-bottom:30px;
}

.card {
  flex:1;
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  text-align:center;
}

.btn {
  background:#2563eb;
  border:none;
  padding:10px 16px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

.locked {
  filter:blur(6px);
  pointer-events:none;
}

.overlay {
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,.85);
  display:flex;
  align-items:center;
  justify-content:center;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

  <div class="nav">
    <h2>NorthSky OS</h2>
    <div id="status" class="badge">🔒 LOCKED</div>
  </div>

  <!-- PRICING -->
  <div class="pricing">
    <div class="card">
      <h3>Starter</h3>
      <p>$99/mo</p>
      <button class="btn buy" data-plan="starter">Buy</button>
    </div>
    <div class="card">
      <h3>Pro</h3>
      <p>$299/mo</p>
      <button class="btn buy" data-plan="pro">Buy</button>
    </div>
    <div class="card">
      <h3>Elite</h3>
      <p>$999/mo</p>
      <button class="btn buy" data-plan="elite">Buy</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div style="position:relative;">
    
    <div id="app" class="locked">

      <h1>Revenue Dashboard</h1>

      <p>Score: <span id="score">0</span></p>
      <p>Revenue: $<span id="rev">0</span></p>

      <button class="btn" id="add">+10 Score</button>
      <button class="btn" id="route">Route Lead</button>

      <hr>

      <button class="btn" id="roof">RoofFlow</button>
      <button class="btn" id="audit">Auditor</button>

    </div>

    <div id="overlay" class="overlay">
      <div>
        <h2>🔒 Locked</h2>
        <p>Purchase to unlock system</p>
      </div>
    </div>

  </div>

</div>

<script>

// ===============================
// CONFIG
// ===============================
const API = "https://northsky-auth.vercel.app";

// ===============================
// TOKEN (cross-site)
// ===============================
(function () {
  const p = new URLSearchParams(location.search);
  const t = p.get("token");
  if (t) {
    localStorage.setItem("ns_token", t);
    history.replaceState({}, "", location.pathname);
  }
})();

// ===============================
// AUTH
// ===============================
async function checkAuth() {
  const token = localStorage.getItem("ns_token");
  if (!token) return false;

  try {
    const res = await fetch(`${API}/api/verify`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    return data.valid;
  } catch {
    return false;
  }
}

// ===============================
// UI LOCK
// ===============================
function lock() {
  document.getElementById("app").classList.add("locked");
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("status").innerText = "🔒 LOCKED";
}

function unlock() {
  document.getElementById("app").classList.remove("locked");
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("status").innerText = "✅ ACTIVE";
}

// ===============================
// CHECKOUT
// ===============================
document.querySelectorAll(".buy").forEach(btn => {
  btn.onclick = async () => {
    const plan = btn.dataset.plan;

    const res = await fetch(`${API}/api/create-checkout`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ plan })
    });

    const data = await res.json();
    window.location.href = data.url;
  };
});

// ===============================
// STATE
// ===============================
let score = 0;
let revenue = 0;

function save() {
  localStorage.setItem("s", score);
  localStorage.setItem("r", revenue);
}

function load() {
  score = parseInt(localStorage.getItem("s") || 0);
  revenue = parseInt(localStorage.getItem("r") || 0);
  render();
}

function render() {
  document.getElementById("score").innerText = score;
  document.getElementById("rev").innerText = revenue;
}

// ===============================
// ACTIONS (SECURED)
// ===============================
async function secure(action) {
  if (!(await checkAuth())) {
    alert("Access denied");
    return false;
  }
  action();
}

// buttons
document.getElementById("add").onclick = () =>
  secure(() => {
    score += 10;
    save();
    render();
  });

document.getElementById("route").onclick = () =>
  secure(() => {
    if (score >= 80) {
      revenue += 75;
      save();
      render();
    } else {
      alert("Need 80 score");
    }
  });

// ===============================
// CROSS-SITE NAV
// ===============================
function go(url) {
  const token = localStorage.getItem("ns_token");
  location.href = `${url}?token=${encodeURIComponent(token)}`;
}

document.getElementById("roof").onclick = () =>
  secure(() => go("https://north-sky-roof-flow-os.vercel.app"));

document.getElementById("audit").onclick = () =>
  secure(() => go("https://north-sky-auditor-sim.vercel.app"));

// ===============================
// INIT
// ===============================
(async function init() {
  if (await checkAuth()) {
    unlock();
    load();
  } else {
    lock();
  }
})();

</script>

</body>
</html>
