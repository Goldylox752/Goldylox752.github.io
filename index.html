<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goldylox Asset Engine</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
padding:40px;
background:#020617;
}

h1{
font-size:40px;
}

.engine{
padding:40px;
}

input{
width:60%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.gallery{
padding:40px;
background:#020617;
}

.gif-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.gif-grid img{
width:100%;
border-radius:10px;
}

footer{
padding:40px;
}

.donate{
background:#f59e0b;
}

</style>

</head>

<body>

<header>

<h1>⚡ Goldylox Asset Engine</h1>
<p>Generate GIFs • Download Media • Build Assets</p>

</header>

<section class="engine">

<h2>Media Engine</h2>

<input
id="videoUrl"
placeholder="Paste video URL or MP4 link"
>

<br>

<button onclick="generateGif()">
Generate GIF
</button>

<button onclick="downloadMedia()">
Download MP4
</button>

</section>

<section class="gallery">

<h2>Asset Gallery</h2>

<div class="gif-grid" id="gifGallery">

<img src="https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif">

<img src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif">

<img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif">

</div>

</section>

<footer>

<h2>Support the Engine</h2>

<a href="https://buy.stripe.com/4gM3co1erg5e2Fx3YY2ZO02">
<button class="donate">
Donate via Stripe
</button>
</a>

<p>Goldylox Asset Engine © 2026</p>

</footer>

<script>

function generateGif(){

let url=document.getElementById("videoUrl").value;

if(!url){
alert("Paste a video URL first");
return;
}

alert("GIF generation pipeline started (connect FFmpeg backend next)");

}

function downloadMedia(){

let url=document.getElementById("videoUrl").value;

if(!url){
alert("Paste a media URL first");
return;
}

window.open(url)

}

</script>

</body>

</html>
