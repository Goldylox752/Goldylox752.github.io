<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIM2Door – Web3 SIM NFT</title>

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-528699336"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-528699336');
</script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { background:#0073e6; color:white; text-align:center; padding:20px; }
main { max-width:900px; margin:20px auto; padding:20px; background:white; border-radius:10px; }
.link-btn { display:block; margin:15px 0; padding:15px; background:#0073e6; color:white; text-decoration:none; border-radius:5px; text-align:center;}
#affiliatePopup { position:fixed; bottom:20px; right:20px; display:none; background:white; padding:20px; border:2px solid #0073e6; }
#affiliatePopup.show { display:block; }
</style>
</head>

<body>

<header>
<h1>SIM2Door</h1>
<p>Buy SIM NFTs with Ethereum</p>
</header>

<main>
<button id="connectWallet" class="link-btn">Connect Wallet</button>
<p id="walletAddress"></p>

<p>Price: <span id="mintPrice">Loading...</span> ETH</p>
<button id="buySim" class="link-btn">Buy SIM NFT</button>
<p id="purchaseStatus"></p>
</main>

<div id="affiliatePopup">
<p>Special Offers</p>
</div>

<!-- ✅ ONLY ONE SCRIPT BLOCK -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.min.js"></script>
<script>
let provider, signer, contract;

const CONTRACT_ADDRESS = "YOUR_CONTRACT_ADDRESS";
const CONTRACT_ABI = [
  "function getMintPrice() view returns (uint256)",
  "function mint() payable"
];

const connectBtn = document.getElementById('connectWallet');
const walletAddressEl = document.getElementById('walletAddress');
const buyBtn = document.getElementById('buySim');
const purchaseStatus = document.getElementById('purchaseStatus');
const mintPriceEl = document.getElementById('mintPrice');
const affiliatePopup = document.getElementById('affiliatePopup');

// Update price
async function updateMintPrice(){
    if(!contract) return;
    const price = await contract.getMintPrice();
    mintPriceEl.textContent = ethers.formatEther(price);
}

// Connect wallet
connectBtn.onclick = async () => {
    if(!window.ethereum){
        walletAddressEl.textContent = "Install MetaMask";
        return;
    }

    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();

    const address = await signer.getAddress();
    walletAddressEl.textContent = address;

    contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
    updateMintPrice();
};

// Buy NFT
buyBtn.onclick = async () => {
    if(!signer || !contract){
        purchaseStatus.textContent = "Connect wallet first";
        return;
    }

    try {
        const price = await contract.getMintPrice();

        buyBtn.disabled = true;
        buyBtn.textContent = "Processing...";

        const tx = await contract.mint({ value: price });

        purchaseStatus.textContent = "Waiting for confirmation...";
        await tx.wait();

        purchaseStatus.textContent = "✅ NFT Minted!";

        // popup
        affiliatePopup.classList.add('show');
        setTimeout(()=> affiliatePopup.classList.remove('show'), 20000);

        updateMintPrice();

    } catch(err){
        purchaseStatus.textContent = "❌ Failed";
        console.error(err);
    }

    buyBtn.disabled = false;
    buyBtn.textContent = "Buy SIM NFT";
};
</script>

</body>
</html>
