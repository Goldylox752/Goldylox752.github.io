<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS Solutions | Asset Engine</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
async function handleDownload() {

    const urlInput = document.getElementById('videoUrl').value;
    const status = document.getElementById('statusMessage');
    const btn = document.getElementById('dlBtn');

    if (!urlInput) {
        alert("Please paste a YouTube link!");
        return;
    }

    btn.disabled = true;
    status.innerText = "Requesting download from Cobalt...";

    try {

        // Example placeholder
        console.log("Downloading:", urlInput);
        status.innerText = "Processing download...";

    } catch (err) {

        console.error(err);
        status.innerText = "Download failed.";

    } finally {

        btn.disabled = false;

    }

}
</script>

<style>

.brutal-card {
border:4px solid black;
box-shadow:8px 8px 0px black;
background:white;
transition:0.15s;
}

.brutal-card:hover{
transform:translate(-4px,-4px);
box-shadow:12px 12px 0px black;
}

.brutal-btn{
border:4px solid black;
box-shadow:4px 4px 0px black;
transition:0.1s;
cursor:pointer;
}

.brutal-btn:active{
transform:translate(2px,2px);
box-shadow:none;
}

</style>

</head>
