<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky AI · Lead Marketplace</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-2NZW6V24JP"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-2NZW6V24JP');
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#020617;
color:#fff;
font-family:system-ui;
padding:2rem 1rem;
}
.container{max-width:1100px;margin:auto}
h1{font-size:2.2rem;margin-bottom:.5rem}
.sub{color:#94a3b8;margin-bottom:2rem}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:1.5rem;
}
@media(max-width:800px){.grid{grid-template-columns:1fr}}

.card{
background:#0f172a;
padding:1.4rem;
border-radius:1rem;
border:1px solid rgba(255,255,255,.06);
}

input,select{
width:100%;
padding:.75rem;
margin-bottom:.8rem;
background:#020617;
border:1px solid rgba(255,255,255,.08);
border-radius:.6rem;
color:#fff;
}

button{
width:100%;
padding:.8rem;
border:none;
border-radius:.8rem;
background:#2dd4bf;
font-weight:700;
cursor:pointer;
}

button:hover{background:#14b8a6}

.status{
font-size:.8rem;
margin-top:.5rem;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ NorthSky Lead Marketplace</h1>
<div class="sub">Instant Leads. Instant Buyers. Instant Revenue.</div>

<div class="grid">

<!-- 🔥 LEAD FORM (PRIMARY MONEY) -->
<div class="card">
<h3>🏠 Get a Quote</h3>

<input id="leadName" placeholder="Full Name">
<input id="leadContact" placeholder="Phone or Email (required)">
<input id="leadPostal" placeholder="Postal Code">

<select id="leadService">
<option>Roof inspection</option>
<option>Leak repair</option>
<option>Insurance claim</option>
<option>Full replacement</option>
</select>

<button id="submitLead">Get Quotes</button>
<div id="leadStatus" class="status">Ready</div>
</div>

<!-- 💳 CONTRACTOR SIGNUP (BUYERS) -->
<div class="card">
<h3>💰 Join as Contractor</h3>

<input id="cName" placeholder="Business Name">
<input id="cEmail" placeholder="Email">
<input id="cPhone" placeholder="Phone">
<input id="cCity" placeholder="City (Edmonton / Calgary)">

<button id="signupBtn">Start Getting Leads</button>
<div id="signupStatus" class="status"></div>
</div>

</div>

</div>

<script>
const BACKEND = "";
const SITE_ID = "northsky-main";

/* =========================
   LEAD SUBMIT
========================= */
submitLead.onclick = async () => {

  const body = {
    name: leadName.value.trim(),
    contact: leadContact.value.trim(),
    postalCode: leadPostal.value.trim(),
    service: leadService.value,
    source: "website",
    siteId: SITE_ID,
    pageUrl: window.location.href
  };

  if(!body.contact || body.contact.length < 5){
    leadStatus.innerText = "❌ Enter valid contact";
    return;
  }

  leadStatus.innerText = "Sending...";

  try{
    const res = await fetch((BACKEND||location.origin)+"/lead",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });

    const data = await res.json();

    if(!data.success){
      leadStatus.innerText = "❌ Failed";
      return;
    }

    leadStatus.innerText =
      `✅ Sent | Score: ${data.score} | $${data.revenue}`;

    gtag('event','lead_created',{
      value: data.revenue || 0
    });

    leadName.value="";
    leadContact.value="";
    leadPostal.value="";

  }catch(err){
    leadStatus.innerText = "❌ Server error";
  }
};

/* =========================
   CONTRACTOR SIGNUP
========================= */
signupBtn.onclick = async () => {

  const body = {
    name: cName.value,
    email: cEmail.value,
    phone: cPhone.value,
    city: cCity.value
  };

  if(!body.email){
    signupStatus.innerText = "❌ Email required";
    return;
  }

  signupStatus.innerText = "Creating account...";

  try{
    const res = await fetch((BACKEND||location.origin)+"/contractor/signup",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });

    const data = await res.json();

    if(!data.success){
      signupStatus.innerText = "❌ Failed";
      return;
    }

    signupStatus.innerText =
      "✅ Account created. Add payment method next.";

  }catch(err){
    signupStatus.innerText = "❌ Server error";
  }
};
</script>

</body>
</html>
