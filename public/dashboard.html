<!DOCTYPE html>
<html lang="en">
<head>
    <title>SIM2Door Admin</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #f1f2f6; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .stat { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .orders { background: white; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Operations Dashboard</h1>
    <div class="grid">
        <div class="stat"><h3>SIMs Sold</h3><p id="count">0</p></div>
        <div class="stat"><h3>Revenue</h3><p id="rev">$0</p></div>
    </div>
    <div class="orders">
        <h3>Recent Transactions</h3>
        <div id="list">Loading...</div>
    </div>

    <script>
        async function loadData() {
            const res = await fetch('/api/dashboard');
            const data = await res.json();
            document.getElementById('count').innerText = data.totalSIMsSold;
            document.getElementById('rev').innerText = `$${data.totalRevenue}`;
            document.getElementById('list').innerHTML = data.recentOrders.map(o => 
                `<p><strong>${o.name}</strong> - ${o.email}</p>`
            ).join('');
        }
        loadData();
        setInterval(loadData, 30000); // Refresh every 30 seconds
    </script>
</body>
</html>
