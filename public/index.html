<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky OS · SaaS Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#0b1220;
  color:#fff;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.badge {
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.locked { background:#7f1d1d; color:#fecaca; }
.active { background:#14532d; color:#bbf7d0; }

.pricing {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:30px;
}

.card {
  flex:1;
  min-width:220px;
  background:#111827;
  padding:20px;
  border-radius:14px;
}

button {
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

.dashboard {
  background:#111827;
  padding:20px;
  border-radius:14px;
  position:relative;
}

.locked-ui {
  filter:blur(8px);
  pointer-events:none;
}

.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.hidden { display:none; }

input {
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px 0;
  width:100%;
}

.footer {
  margin-top:40px;
  text-align:center;
  font-size:13px;
  color:#9ca3af;
}
</style>
</head>

<body>

<div class="container">

  <!-- NAV -->
  <div class="nav">
    <h2>☁️ NorthSky OS</h2>
    <div id="status" class="badge locked">LOCKED</div>
  </div>

  <!-- PRICING -->
  <div class="pricing">

    <div class="card">
      <h3>Starter</h3>
      <p>$99 / month</p>
      <button class="buy" data-plan="starter">Subscribe</button>
    </div>

    <div class="card">
      <h3>Pro</h3>
      <p>$299 / month</p>
      <button class="buy" data-plan="pro">Subscribe</button>
    </div>

    <div class="card">
      <h3>Elite</h3>
      <p>$999 / month</p>
      <button class="buy" data-plan="elite">Subscribe</button>
    </div>

  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">

    <div id="overlay" class="overlay">
      🔒 Subscribe to unlock system
    </div>

    <div id="app" class="locked-ui">

      <h2>Dashboard</h2>

      <p>Plan: <strong id="plan">None</strong></p>
      <p>Score: <span id="score">0</span></p>
      <p>Revenue: $<span id="rev">0</span></p>

      <button id="addScore">+10 Score</button>
      <button id="routeLead">Route Lead ($75)</button>

      <hr>

      <h3>Lead Capture</h3>

      <input id="email" placeholder="Email">
      <input id="name" placeholder="Name">
      <button id="offer">Submit Lead</button>

      <br><br>
      <button id="logout">Logout</button>

    </div>

  </div>

  <div class="footer">
    © 2026 NorthSky OS · SaaS Engine
  </div>

</div>

<script>
/**
 * =========================
 * STATE
 * =========================
 */
let state = {
  score: 0,
  revenue: 0,
  auth: false,
  plan: null
};

const el = (id) => document.getElementById(id);

/**
 * =========================
 * VERIFY FUNCTION
 * =========================
 */
async function verify(email) {
  const r = await fetch("/api/verify-session", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  });

  return await r.json();
}

/**
 * =========================
 * SAVE EMAIL
 * =========================
 */
function saveEmail(email) {
  localStorage.setItem("email", email);
}

/**
 * =========================
 * CHECK UNLOCK
 * =========================
 */
async function checkUnlock() {
  const email = localStorage.getItem("email");
  if (!email) return;

  const data = await verify(email);

  if (data.valid) {
    state.auth = true;
    state.plan = data.plan;

    el("app").classList.remove("locked-ui");
    el("overlay").classList.add("hidden");

    el("status").innerText = "ACTIVE";
    el("status").className = "badge active";

    el("plan").innerText = data.plan;
  }
}

/**
 * =========================
 * SUBSCRIBE FLOW
 * =========================
 */
document.querySelectorAll(".buy").forEach(btn => {
  btn.addEventListener("click", async () => {

    const plan = btn.dataset.plan;

    const email = prompt("Enter email for subscription:");
    if (!email) return;

    saveEmail(email);

    const r = await fetch("/api/create-checkout-session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ plan })
    });

    const data = await r.json();

    if (data.url) {
      window.location.href = data.url;
    }
  });
});

/**
 * =========================
 * DASHBOARD ACTIONS
 * =========================
 */
el("addScore").onclick = () => {
  if (!state.auth) return;
  state.score += 10;
  el("score").innerText = state.score;
};

el("routeLead").onclick = () => {
  if (!state.auth) return;
  state.revenue += 75;
  el("rev").innerText = state.revenue;
};

/**
 * =========================
 * LEAD SUBMIT
 * =========================
 */
el("offer").onclick = () => {
  if (!state.auth) return;

  const email = el("email").value;
  const name = el("name").value;

  alert("Lead submitted: " + name + " / " + email);

  el("email").value = "";
  el("name").value = "";
};

/**
 * =========================
 * LOGOUT
 * =========================
 */
el("logout").onclick = () => {
  localStorage.clear();
  location.reload();
};

/**
 * =========================
 * INIT
 * =========================
 */
checkUnlock();
</script>

</body>
</html>
