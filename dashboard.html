<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIM2Door Admin Dashboard</title>
<meta name="description" content="Admin Dashboard for SIM2Door – view pageviews, buy clicks, and revenue.">

<!-- Google Fonts for clean look -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; margin:0; padding:20px; background:#f4f5f7; color:#111; }
h1 { text-align:center; margin-bottom:40px; color:#007bff; }
table { width:100%; max-width:800px; margin:0 auto; border-collapse: collapse; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
th, td { padding:15px 20px; border-bottom:1px solid #ddd; text-align:center; }
th { background:#007bff; color:#fff; }
tfoot td { font-weight:bold; }
section { margin-bottom:60px; }
</style>
</head>
<body>

<h1>SIM2Door Admin Dashboard</h1>

<section>
<table>
<thead>
<tr>
<th>Page</th>
<th>Pageviews</th>
<th>Buy Clicks</th>
</tr>
</thead>
<tbody id="dashboard-body">
<!-- Data will go here -->
</tbody>
<tfoot>
<tr>
<td>Total SIMs Sold</td>
<td colspan="2" id="total-sims">0</td>
</tr>
<tr>
<td>Total Revenue</td>
<td colspan="2" id="total-revenue">$0</td>
</tr>
</tfoot>
</table>
</section>

<script>
// ====== Static placeholder data for now ======
const dashboardData = [
  { page: "Home", pageviews: 125, clicks: 15 },
  { page: "Canada SIM", pageviews: 87, clicks: 10 },
  { page: "Travel SIM", pageviews: 50, clicks: 5 },
  { page: "Cheap SIM", pageviews: 40, clicks: 3 },
  { page: "Prepaid SIM", pageviews: 60, clicks: 7 }
];

const SIM_PRICE = 20;

// Populate table
const tbody = document.getElementById('dashboard-body');
let totalSims = 0;

dashboardData.forEach(row => {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${row.page}</td><td>${row.pageviews}</td><td>${row.clicks}</td>`;
  tbody.appendChild(tr);
  totalSims += row.clicks; // Assuming each click = 1 purchase for placeholder
});

document.getElementById('total-sims').innerText = totalSims;
document.getElementById('total-revenue').innerText = `$${totalSims * SIM_PRICE}`;
</script>

</body>
</html>
